<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your login code for BatchKit</title>
</head>
<body style="margin:0;padding:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fafafa;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:8px;border:1px solid #e4e4e7;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px;">
              <p style="margin:0;font-size:16px;font-weight:600;color:#18181b;letter-spacing:-0.01em;">BatchKit</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 40px 32px;">
              <h1 style="margin:0 0 24px;font-size:22px;font-weight:700;color:#18181b;letter-spacing:-0.02em;">Your login code for BatchKit</h1>

              <!-- Magic link button -->
              <table cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
                <tr>
                  <td style="border-radius:8px;background:#18181b;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">
                      Log in to BatchKit
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Explanation -->
              <p style="margin:0 0 20px;font-size:14px;color:#52525b;line-height:1.6;">
                This link and code will only be valid for the next hour. If the link does not work, you can use the login code directly:
              </p>

              <!-- OTP code -->
              <div style="display:inline-block;background:#f4f4f5;border-radius:6px;padding:10px 18px;">
                <span style="font-family:'Courier New',Courier,monospace;font-size:22px;font-weight:700;letter-spacing:0.2em;color:#18181b;">{{ .Token }}</span>
              </div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px 28px;border-top:1px solid #f4f4f5;">
              <p style="margin:0;font-size:12px;color:#a1a1aa;">
                If you didn&rsquo;t request this, you can safely ignore it.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
